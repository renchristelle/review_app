<!DOCTYPE html>
<html lang="{{ t.lang }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t.page_title_login }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1 class="login-title">{{ t.app_title }}</h1>

      {% if error %}
      <p class="login-error">{{ error }}</p>
      {% endif %}

      <form method="POST" action="/login" class="login-form">
        <input type="hidden" name="next" value="{{ next }}">

        <div class="login-field">
          <label for="username">{{ t.login_username }}</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        </div>

        <div class="login-field">
          <label for="password">{{ t.login_password }}</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-btn">{{ t.login_submit }}</button>
      </form>
    </div>
  </div>
</body>

</html>
